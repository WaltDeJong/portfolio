# Add inside your server {} block in /etc/nginx/sites-available/walterdejong.dev

# Hashed assets (JS/CSS bundles) — cache forever, Vite fingerprints filenames
location ~* /assets/.*\.(js|css)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# Images and fonts — cache for 1 year
location ~* \.(webp|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|otf)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# HTML — never cache (so deploys take effect immediately)
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
}

# robots.txt — short cache
location = /robots.txt {
    expires 1d;
    add_header Cache-Control "public";
}
